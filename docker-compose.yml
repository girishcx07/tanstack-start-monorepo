services:
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    networks:
      - t3-network

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=acme
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acme"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - t3-network

  web:
    build:
      context: .
      dockerfile: apps/tanstack-start/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/acme
      - VITE_API_URL=http://localhost:3000/api
      - AUTH_SECRET=supersecret
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - t3-network

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/acme
      - PUBLIC_WEB_URL=http://localhost:3000
      - PUBLIC_SERVER_URL=http://localhost:3000
      - AUTH_SECRET=supersecret
      - PORT=3001
      - HOST=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - t3-network

networks:
  t3-network:
    driver: bridge
